<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaFinance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-[#F8F9F6] text-gray-900">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl">
        <!-- Header -->
        <div class="bg-gradient-to-r from-[#2A9D8F] to-[#4ECDC4] text-white p-6 rounded-b-3xl">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-semibold">AquaFinance</h1>
                    <p class="text-white/80 text-sm">Olá, Daniel</p>
                </div>
                <div class="text-right">
                    <p class="text-sm opacity-75">Saldo atual</p>
                    <p class="text-4xl font-bold">R$ 4.872,35</p>
                </div>
            </div>
        </div>

        <!-- Quick actions -->
        <div class="p-6 -mt-4">
            <div class="bg-white rounded-3xl shadow flex justify-around py-4">
                <button onclick="addIncome()" class="flex flex-col items-center">
                    <div class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center text-2xl">+</div>
                    <p class="text-xs mt-1 font-medium">Receita</p>
                </button>
                <button onclick="addExpense()" class="flex flex-col items-center">
                    <div class="w-12 h-12 bg-red-100 text-red-500 rounded-2xl flex items-center justify-center text-2xl">−</div>
                    <p class="text-xs mt-1 font-medium">Despesa</p>
                </button>
                <button class="flex flex-col items-center">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-2xl">📊</div>
                    <p class="text-xs mt-1 font-medium">Relatórios</p>
                </button>
            </div>
        </div>

        <!-- Balance card -->
        <div class="px-6">
            <div class="bg-white rounded-3xl p-5 shadow">
                <p class="text-gray-500 text-sm">Este mês</p>
                <div class="flex justify-between items-end mt-2">
                    <div>
                        <p class="text-3xl font-semibold text-[#2A9D8F]">+ R$ 1.240</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-green-600">↑ 18% em relação ao mês passado</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Transactions -->
        <div class="px-6 mt-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-semibold">Últimas transações</h2>
                <a href="#" class="text-[#4ECDC4] text-sm font-medium">Ver todas</a>
            </div>
            
            <div class="space-y-4">
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center">🍔</div>
                        <div>
                            <p class="font-medium">Almoço</p>
                            <p class="text-xs text-gray-500">Hoje • Alimentação</p>
                        </div>
                    </div>
                    <p class="font-medium text-red-500">- R$ 42,00</p>
                </div>
                
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center">💰</div>
                        <div>
                            <p class="font-medium">Salário</p>
                            <p class="text-xs text-gray-500">30 mai • Salário</p>
                        </div>
                    </div>
                    <p class="font-medium text-green-600">+ R$ 3.850</p>
                </div>
            </div>
        </div>

        <div class="h-20"></div>
    </div>

    <script>
        function addIncome() {
            alert('✅ Receita adicionada! (Funcionalidade em breve)');
        }
        function addExpense() {
            alert('✅ Despesa adicionada! (Funcionalidade em breve)');
        }

        // Tailwind script
        document.documentElement.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
